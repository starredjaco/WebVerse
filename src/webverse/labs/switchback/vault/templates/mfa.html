{% extends "base.html" %}
{% block content %}
  <div class="auth-shell">
    <div class="auth-head">
      <span class="logo-mark" aria-hidden="true"></span>
      <div>
        <h2 class="auth-title">MFA required</h2>
        <div class="small">Enter the 6-digit verification code for this login.</div>
      </div>
    </div>

    <div class="card">
      {% if error %}
        <div class="alert">{{ error }}</div>
      {% endif %}

      <form method="post" action="/mfa">
        <label>Code</label>
        <input name="code" inputmode="numeric" pattern="[0-9]{6}" minlength="6" maxlength="6" placeholder="123456" autocomplete="one-time-code" />

        <button class="btn primary" style="margin-top:14px;width:100%;">Verify</button>
      </form>

      <div class="small" style="margin-top:12px;"><a href="/logout">Back</a></div>
    </div>
  </div>
{% endblock %}
