{% extends "base.html" %}
{% block content %}
  <section class="hero" style="padding-top:10px;">
    <div class="badge purple"><span class="dot" style="background:var(--primary)"></span>Create</div>
    <h1 style="font-size:30px;margin-top:10px;">New secret</h1>
    <p class="small" style="margin-top:8px;">Secrets are scoped to your account.</p>
  </section>

  {% if error %}<div class="alert">{{ error }}</div>{% endif %}

  <div class="card">
    <div class="section-title">Secret</div>
    <form method="post" action="/secrets/new">
      <label>Name</label>
      <input name="name" placeholder="e.g. staging-api-key" maxlength="120" />

      <label style="margin-top:12px;">Value</label>
      <textarea name="value" rows="5" placeholder="secret value..."></textarea>

      <div class="grid-2" style="grid-template-columns:1fr 1fr;gap:14px;margin-top:6px;">
        <div>
          <label>Description</label>
          <textarea name="description" rows="3" placeholder="optional description..."></textarea>
        </div>
        <div>
          <label>Tags</label>
          <input name="tags" placeholder="comma,separated,tags" maxlength="255" />
          <label style="margin-top:12px;">Expires at</label>
          <input name="expires_at" placeholder="YYYY-MM-DD or YYYY-MM-DDTHH:MM" />
        </div>
      </div>

      <button class="btn primary sm" style="margin-top:14px;">Create</button>
    </form>

    <div class="small" style="margin-top:12px;line-height:1.6;">
      Names support internal templating for automation.
    </div>
  </div>
{% endblock %}
