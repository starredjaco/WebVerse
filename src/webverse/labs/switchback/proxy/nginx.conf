worker_processes  1;

events { worker_connections  1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  # Default: unknown hosts get a generic gateway response.
  # This makes Host header fuzzing meaningful.
  server {
    listen 80 default_server;
    server_name _;

    add_header Content-Type text/plain;
    return 404 "Switchback Edge Gateway\n";
  }

  server {
    listen 80;
    server_name switchback.local www.switchback.local;

    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://main_site:8000;
    }
  }

  server {
    listen 80;
    server_name api.switchback.local;

    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://api:8000;
    }
  }

  server {
    listen 80;
    server_name mail.switchback.local;

    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://mail:8000;
    }
  }

  server {
    listen 80;
    server_name vault.switchback.local;

    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://vault:8000;
    }
  }
}
