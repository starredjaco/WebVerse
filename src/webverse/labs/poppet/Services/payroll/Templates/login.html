{% extends 'base.html' %}{% block title %}Sign In - Poppet Payroll{% endblock %}
{% block content %}<div class="login-wrap"><div class="login-box"><div class="login-card">
  <div class="login-brand"><img src="/Static/icon.svg" alt=""><h2>Poppet Payroll</h2><p>Employee compensation management</p></div>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="POST" action="/login">
    <div class="form-group"><label>Username</label><input type="text" name="username" placeholder="Enter your username" required autofocus></div>
    <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Enter your password" required></div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;">Sign In</button>
  </form>
</div></div></div>{% endblock %}
