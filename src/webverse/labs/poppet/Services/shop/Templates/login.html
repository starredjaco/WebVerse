{% extends 'base.html' %}{% block title %}Sign In - Poppet Shop{% endblock %}
{% block content %}<div class="login-box"><h2>Sign In</h2>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="POST" action="/login"><div class="form-group"><label>Username</label><input type="text" name="username" required></div>
  <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
  <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button></form>
  <p style="text-align:center;margin-top:var(--brand-space-4);font-size:0.9rem;"><a href="/reset-password">Forgot password?</a></p></div>{% endblock %}
