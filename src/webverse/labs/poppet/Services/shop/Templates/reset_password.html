{% extends 'base.html' %}{% block title %}Reset Password - Poppet Shop{% endblock %}
{% block content %}<div class="login-box"><h2>Reset Password</h2>
  <p style="color:var(--brand-muted);font-size:0.9rem;margin-bottom:var(--brand-space-4);">Enter your user ID to receive a reset code.</p>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  {% if message %}<div class="alert alert-success">{{ message }}</div>{% endif %}
  <form method="POST" action="/reset-password"><div class="form-group"><label>User ID</label><input type="number" name="user_id" required></div>
  <button type="submit" class="btn btn-primary" style="width:100%;">Send Reset Code</button></form>
  <p style="text-align:center;margin-top:var(--brand-space-4);font-size:0.9rem;"><a href="/verify-reset">Already have a code?</a></p></div>{% endblock %}
