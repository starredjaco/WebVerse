<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#1a1a2e" rx="12"/>
  <!-- Warm glow -->
  <radialGradient id="glow"><stop offset="0%" stop-color="#f8d878" stop-opacity="0.15"/><stop offset="100%" stop-color="#f8d878" stop-opacity="0"/></radialGradient>
  <circle cx="200" cy="200" r="160" fill="url(#glow)"/>
  <!-- Lantern body - tin -->
  <rect x="140" y="120" width="120" height="180" rx="4" fill="#4a4a5c" stroke="#5a5a6c" stroke-width="1.5"/>
  <rect x="145" y="125" width="110" height="170" fill="#3a3a4c"/>
  <!-- Top cap -->
  <rect x="130" y="112" width="140" height="14" rx="4" fill="#5a5a6c" stroke="#6a6a7c" stroke-width="1"/>
  <!-- Handle -->
  <path d="M170 112 Q170 80 200 75 Q230 80 230 112" stroke="#5a5a6c" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Bottom -->
  <rect x="130" y="298" width="140" height="12" rx="4" fill="#5a5a6c"/>
  <!-- Star holes with light rays -->
  <g fill="#f8d878">
    <!-- Orion-ish constellation -->
    <circle cx="170" cy="155" r="3"/><circle cx="185" cy="150" r="2.5"/><circle cx="200" cy="148" r="3"/>
    <circle cx="175" cy="175" r="2"/><circle cx="195" cy="178" r="2"/>
    <circle cx="165" cy="200" r="2.5"/><circle cx="180" cy="210" r="3"/><circle cx="200" cy="205" r="2.5"/>
    <!-- Dipper-ish -->
    <circle cx="220" cy="165" r="2.5"/><circle cx="235" cy="170" r="2"/>
    <circle cx="240" cy="185" r="2.5"/><circle cx="232" cy="200" r="2"/>
    <circle cx="225" cy="210" r="2"/><circle cx="218" cy="225" r="2.5"/>
    <!-- Scattered -->
    <circle cx="160" cy="240" r="2"/><circle cx="190" cy="250" r="1.5"/>
    <circle cx="230" cy="248" r="2"/><circle cx="210" cy="270" r="1.5"/>
    <circle cx="170" cy="275" r="2"/><circle cx="245" cy="265" r="1.5"/>
  </g>
  <!-- Constellation lines -->
  <g stroke="#f8d878" stroke-width="0.5" opacity="0.3">
    <line x1="170" y1="155" x2="185" y2="150"/><line x1="185" y1="150" x2="200" y2="148"/>
    <line x1="175" y1="175" x2="195" y2="178"/>
    <line x1="165" y1="200" x2="180" y2="210"/><line x1="180" y1="210" x2="200" y2="205"/>
    <line x1="220" y1="165" x2="235" y2="170"/><line x1="235" y1="170" x2="240" y2="185"/>
    <line x1="240" y1="185" x2="232" y2="200"/><line x1="232" y1="200" x2="225" y2="210"/>
  </g>
  <!-- Light rays projecting outward -->
  <g stroke="#f8d878" stroke-width="0.5" opacity="0.15">
    <line x1="170" y1="155" x2="90" y2="120"/><line x1="200" y1="148" x2="200" y2="60"/>
    <line x1="240" y1="185" x2="330" y2="170"/><line x1="165" y1="200" x2="60" y2="210"/>
    <line x1="230" y1="248" x2="320" y2="280"/><line x1="170" y1="275" x2="80" y2="320"/>
    <line x1="218" y1="225" x2="300" y2="240"/>
  </g>
  <!-- LED tea light at bottom -->
  <ellipse cx="200" cy="290" rx="15" ry="4" fill="#f8d878" opacity="0.2"/>
  <rect x="194" y="282" width="12" height="10" rx="3" fill="#f8e8a8" opacity="0.3"/>
  <!-- Projected stars on walls (distant) -->
  <g fill="#f8d878" opacity="0.08">
    <circle cx="50" cy="100" r="8"/><circle cx="340" cy="80" r="6"/>
    <circle cx="30" cy="280" r="7"/><circle cx="370" cy="300" r="5"/>
    <circle cx="60" cy="180" r="5"/><circle cx="350" cy="200" r="6"/>
  </g>
</svg>
