  <path d="M142 268 Q148 264 154 268 Q160 272 166 268 Q172 264 178 268 Q184 272 190 268 Q196 264 202 268" stroke="#4a7a90" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Scarf tail -->
  <path d="M210 268 Q220 275 215 295 Q212 305 218 310" stroke="#4a7a90" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M210 268 Q220 275 215 295 Q212 305 218 310" stroke="#5a8aa0" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Paws -->
  <ellipse cx="150" cy="332" rx="18" ry="10" fill="#dc8040"/>
