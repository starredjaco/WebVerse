  <text x="230" y="210" font-family="system-ui" font-size="16" font-weight="700" fill="#b8a898" opacity="0.4">z</text>
  <text x="245" y="195" font-family="system-ui" font-size="13" font-weight="700" fill="#b8a898" opacity="0.3">z</text>
  <text x="255" y="183" font-family="system-ui" font-size="10" font-weight="700" fill="#b8a898" opacity="0.2">z</text>
