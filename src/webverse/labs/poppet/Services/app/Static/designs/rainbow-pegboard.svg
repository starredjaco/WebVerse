  <rect x="88" y="108" width="224" height="224" rx="6" fill="#dcc498"/>
  <!-- Peg holes grid 6x6 -->
  <g fill="#c4a87a">
    <circle cx="120" cy="140" r="8"/><circle cx="160" cy="140" r="8"/><circle cx="200" cy="140" r="8"/><circle cx="240" cy="140" r="8"/><circle cx="280" cy="140" r="8"/>
