    <circle cx="240" cy="178" r="8" fill="#e8a832"/><rect x="235" y="170" width="10" height="16" rx="4" fill="#e8a832"/><ellipse cx="240" cy="170" rx="8" ry="4" fill="#f0b840"/>
    <circle cx="160" cy="218" r="8" fill="#48a860"/><rect x="155" y="210" width="10" height="16" rx="4" fill="#48a860"/><ellipse cx="160" cy="210" rx="8" ry="4" fill="#58b870"/>
    <circle cx="240" cy="138" r="8" fill="#4888d0"/><rect x="235" y="130" width="10" height="16" rx="4" fill="#4888d0"/><ellipse cx="240" cy="130" rx="8" ry="4" fill="#5898e0"/>
    <circle cx="280" cy="218" r="8" fill="#9858b0"/><rect x="275" y="210" width="10" height="16" rx="4" fill="#9858b0"/><ellipse cx="280" cy="210" rx="8" ry="4" fill="#a868c0"/>
