    <circle cx="120" cy="260" r="8"/><circle cx="160" cy="260" r="8"/><circle cx="240" cy="260" r="8"/><circle cx="280" cy="260" r="8"/>
    <circle cx="120" cy="300" r="8"/><circle cx="160" cy="300" r="8"/><circle cx="200" cy="300" r="8"/><circle cx="240" cy="300" r="8"/><circle cx="280" cy="300" r="8"/>
