  <path d="M310 340 Q340 320 350 350 Q345 370 320 365 Q305 360 310 340 Z" fill="#d4c8a8" stroke="#c4b898" stroke-width="1" opacity="0.5"/>
  <!-- Loose pegs -->
  <rect x="325" y="335" width="6" height="14" rx="3" fill="#e85454" transform="rotate(20,328,342)"/>
  <rect x="340" y="345" width="6" height="14" rx="3" fill="#48a860" transform="rotate(-10,343,352)"/>
