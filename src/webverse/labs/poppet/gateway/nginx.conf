events { worker_connections 128; }
http {
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name poppet.local;
        location / { proxy_pass http://app:5000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    }

    server {
        listen 80;
        server_name shop.poppet.local;
        location / { proxy_pass http://shop:5000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    }

    server {
        listen 80;
        server_name connect-api.poppet.local;
        location / {
            set $connect_backend http://connect-api:5000;
            proxy_pass $connect_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 80;
        server_name crm.poppet.local;
        location / { proxy_pass http://crm:5000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    }

    server {
        listen 80;
        server_name payroll.poppet.local;
        location / { proxy_pass http://payroll:5000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    }

    server {
        listen 80;
        server_name dispatch-api.poppet.local;
        location / { proxy_pass http://dispatch-api:5000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    }

}